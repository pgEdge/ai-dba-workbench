name: E2E Tests

on:
    push:
        branches: [automation_practice]
    # workflow_dispatch is only visible in the GitHub UI when viewing the
    # default branch or when the branch is explicitly selected in the
    # Run workflow dropdown. Inputs below appear once a branch with this
    # workflow is selected.
    workflow_dispatch:
        inputs:
            install_mode:
                description: "Install mode"
                type: choice
                options:
                    - docker
                    - rpm
                default: docker
            platform_image:
                description: "Platform / OS (RPM mode only)"
                type: choice
                options:
                    - ubuntu22
                    - debian12
                    - rocky9
                    - rocky10
                    - rhel9
                    - rhel10
                default: ubuntu22
            repo_channel:
                description: "Repository channel (RPM mode only)"
                type: choice
                options:
                    - staging
                    - release
                default: staging

jobs:
    e2e:
        name: "E2E (${{ inputs.install_mode == 'rpm' && format('RPM {0}/{1}', inputs.platform_image, inputs.repo_channel) || format('Docker PG{0}', matrix.postgres_version) }})"
        runs-on: ubuntu-latest
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                postgres_version: [18]
        env:
            POSTGRES_PASSWORD: postgres
            E2E_CONFIG_DIR: ${{ github.workspace }}/client/tests/e2e/config
            E2E_SECRET_DIR: ${{ github.workspace }}/client/tests/e2e/secret

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Resolve install mode
              id: resolve-mode
              run: |
                  if [ "${{ github.event_name }}" = "push" ]; then
                    echo "install_mode=docker" >> "$GITHUB_OUTPUT"
                    echo "repo_channel=staging" >> "$GITHUB_OUTPUT"
                    echo "platform_image=ubuntu22" >> "$GITHUB_OUTPUT"
                  else
                    echo "install_mode=${{ inputs.install_mode }}" >> "$GITHUB_OUTPUT"
                    echo "repo_channel=${{ inputs.repo_channel }}" >> "$GITHUB_OUTPUT"
                    echo "platform_image=${{ inputs.platform_image }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22
                  cache-dependency-path: client/tests/e2e/package-lock.json

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

            - name: Create secret files
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: |
                  mkdir -p client/tests/e2e/secret
                  openssl rand -base64 32 > client/tests/e2e/secret/ai-dba.secret
                  echo "postgres" > client/tests/e2e/secret/pg-password

            - name: Set PostgreSQL image variables
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: |
                  case "${{ matrix.postgres_version }}" in
                    16)
                      echo "POSTGRES_IMAGE=postgres:16-alpine" >> "$GITHUB_ENV"
                      echo "PGDATA_DIR=/var/lib/postgresql/data" >> "$GITHUB_ENV"
                      ;;
                    17)
                      echo "POSTGRES_IMAGE=postgres:17-alpine" >> "$GITHUB_ENV"
                      echo "PGDATA_DIR=/var/lib/postgresql/data" >> "$GITHUB_ENV"
                      ;;
                    18)
                      echo "POSTGRES_IMAGE=ghcr.io/pgedge/pgedge-postgres:18-spock5-standard" >> "$GITHUB_ENV"
                      echo "PGDATA_DIR=/var/lib/pgsql/18/data" >> "$GITHUB_ENV"
                      ;;
                  esac

            - name: Build Docker images
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml build --parallel
              timeout-minutes: 20

            - name: Start services
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml up -d

            - name: Wait for PostgreSQL to be healthy
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: |
                  echo "Waiting for PostgreSQL..."
                  attempts=0
                  max_attempts=30
                  while [ $attempts -lt $max_attempts ]; do
                    if docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml ps postgres | grep -q "healthy"; then
                      echo "PostgreSQL is healthy"
                      break
                    fi
                    sleep 3
                    attempts=$((attempts + 1))
                  done
                  if [ $attempts -ge $max_attempts ]; then
                    echo "ERROR: PostgreSQL failed to become healthy"
                    docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml ps
                    docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs postgres
                    exit 1
                  fi

            - name: Wait for server to respond
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: |
                  echo "Waiting for server health endpoint..."
                  attempts=0
                  max_attempts=30
                  while [ $attempts -lt $max_attempts ]; do
                    if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                      echo "Server is responsive"
                      break
                    fi
                    sleep 3
                    attempts=$((attempts + 1))
                  done
                  if [ $attempts -ge $max_attempts ]; then
                    echo "ERROR: Server did not respond"
                    docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml ps
                    docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs server
                    exit 1
                  fi

            - name: Create admin user
              if: steps.resolve-mode.outputs.install_mode == 'docker'
              run: |
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml exec -T server \
                    /usr/local/bin/ai-dba-server \
                    -config /etc/pgedge/ai-dba-server.yaml \
                    -data-dir /data \
                    -add-user -username admin -password "E2ETestPass123!" \
                    -full-name "E2E Admin" -email "admin@e2e.test" </dev/null

                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml exec -T server \
                    /usr/local/bin/ai-dba-server \
                    -config /etc/pgedge/ai-dba-server.yaml \
                    -data-dir /data \
                    -set-superuser -username admin </dev/null

            - name: Install E2E dependencies
              working-directory: client/tests/e2e
              run: npm ci

            - name: Install Allure CLI
              run: npm install -g allure-commandline --save-dev

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('client/tests/e2e/package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              working-directory: client/tests/e2e
              run: npx playwright install --with-deps chromium firefox webkit

            - name: Install Playwright system dependencies
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              working-directory: client/tests/e2e
              run: npx playwright install-deps chromium firefox webkit

            - name: Run E2E tests
              working-directory: client/tests/e2e
              env:
                  E2E_BASE_URL: http://localhost:3000
                  E2E_API_URL: http://localhost:8080
                  E2E_ADMIN_USER: admin
                  E2E_ADMIN_PASS: "E2ETestPass123!"
                  CI: "true"
                  INSTALL_MODE: ${{ steps.resolve-mode.outputs.install_mode }}
                  REPO_CHANNEL: ${{ steps.resolve-mode.outputs.repo_channel }}
                  PLATFORM_IMAGE: ${{ steps.resolve-mode.outputs.platform_image }}
              run: npm test

            - name: Generate Allure report
              if: always()
              working-directory: client/tests/e2e
              run: |
                  cp categories.json allure-results/ 2>/dev/null || true
                  allure generate ./allure-results --clean -o ./allure-report || true

            - name: Set artifact name
              id: artifact-name
              if: always()
              run: |
                  if [ "${{ steps.resolve-mode.outputs.install_mode }}" = "rpm" ]; then
                    echo "artifact_name=e2e-results-rpm-${{ steps.resolve-mode.outputs.platform_image }}-${{ steps.resolve-mode.outputs.repo_channel }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "artifact_name=e2e-results-docker-pg${{ matrix.postgres_version }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Upload test artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact-name.outputs.artifact_name }}
                  path: |
                      client/tests/e2e/playwright-report/
                      client/tests/e2e/test-results/
                      client/tests/e2e/allure-results/
                      client/tests/e2e/allure-report/
                  retention-days: 14

            - name: Dump Docker mode logs
              if: failure() && steps.resolve-mode.outputs.install_mode == 'docker'
              run: |
                  echo "=== PostgreSQL Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs postgres
                  echo ""
                  echo "=== Server Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs server
                  echo ""
                  echo "=== Collector Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs collector
                  echo ""
                  echo "=== Alerter Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs alerter
                  echo ""
                  echo "=== Client Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml logs client

            - name: Dump RPM mode logs
              if: failure() && steps.resolve-mode.outputs.install_mode == 'rpm'
              run: |
                  echo "=== Workbench Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.rpm.yml logs workbench
                  echo ""
                  echo "=== PostgreSQL Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.rpm.yml logs postgres
                  echo ""
                  echo "=== Mailpit Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.rpm.yml logs mailpit
                  echo ""
                  echo "=== WireMock Logs ==="
                  docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.rpm.yml logs wiremock

            - name: Cleanup Docker mode
              if: always() && steps.resolve-mode.outputs.install_mode == 'docker'
              run: docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.yml down -v

            - name: Cleanup RPM mode
              if: always() && steps.resolve-mode.outputs.install_mode == 'rpm'
              run: docker compose -f $GITHUB_WORKSPACE/client/tests/e2e/docker/docker-compose.rpm.yml down -v
