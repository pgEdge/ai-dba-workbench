name: CI - Alerter

on:
    push:
        branches: [ main, master ]
        paths:
            - 'alerter/**'
            - '.github/workflows/ci-alerter.yml'
    pull_request:
        branches: [ main, master ]
        paths:
            - 'alerter/**'
            - '.github/workflows/ci-alerter.yml'

jobs:
    alerter:
        name: Alerter (Go ${{ matrix.go-version }}, PG ${{ matrix.postgres-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                go-version: ['1.23', '1.24']
                postgres-version: ['14', '15', '16', '17', '18']
            fail-fast: false

        services:
            postgres:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go ${{ matrix.go-version }}
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ matrix.go-version }}
                  cache: false

            - name: Cache Go modules
              uses: actions/cache@v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-${{ matrix.go-version }}-alerter-${{ hashFiles('alerter/src/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-${{ matrix.go-version }}-alerter-

            - name: Verify dependencies
              working-directory: alerter/src
              run: go mod verify

            - name: Download dependencies
              working-directory: alerter/src
              run: go mod download

            - name: Lint alerter code
              if: matrix.go-version == '1.24' && matrix.postgres-version == '18'
              working-directory: alerter
              run: |
                  go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
                  echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
                  make lint

            - name: Run go vet
              if: matrix.go-version == '1.24' && matrix.postgres-version == '18'
              working-directory: alerter/src
              run: go vet ./...

            - name: Check formatting
              if: matrix.go-version == '1.24' && matrix.postgres-version == '18'
              working-directory: alerter
              run: |
                  gofmt -l ./src > /tmp/gofmt.out
                  if [ -s /tmp/gofmt.out ]; then
                    echo "The following files are not formatted:"
                    cat /tmp/gofmt.out
                    exit 1
                  fi

            - name: Build alerter
              working-directory: alerter
              run: make build

            - name: Verify binary
              run: |
                  ls -lh alerter/ai-dba-alerter
                  file alerter/ai-dba-alerter

            - name: Wait for PostgreSQL
              run: |
                  until pg_isready -h localhost -p 5432 -U postgres; do
                    echo "Waiting for PostgreSQL..."
                    sleep 2
                  done

            - name: Run tests with coverage
              working-directory: alerter
              env:
                  TEST_AI_WORKBENCH_SERVER: postgres://postgres:postgres@localhost:5432/postgres
              run: make coverage

            - name: Generate coverage report
              if: matrix.go-version == '1.24' && matrix.postgres-version == '18'
              working-directory: alerter/src
              run: |
                  go tool cover -func=coverage.out

            - name: Upload build artifact
              if: matrix.go-version == '1.24' && matrix.postgres-version == '18'
              uses: actions/upload-artifact@v4
              with:
                  name: ai-dba-alerter-linux-amd64
                  path: alerter/ai-dba-alerter
                  retention-days: 7

            - name: Upload coverage artifact
              if: matrix.go-version == '1.24' && matrix.postgres-version == '18'
              uses: actions/upload-artifact@v4
              with:
                  name: alerter-coverage
                  path: |
                      alerter/src/coverage.html
                      alerter/src/coverage.out
                  retention-days: 7
