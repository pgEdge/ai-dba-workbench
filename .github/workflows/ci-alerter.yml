name: CI - Alerter

on:
    push:
        branches: [ main, master ]
        paths:
            - 'alerter/**'
            - '.github/workflows/ci-alerter.yml'
    pull_request:
        branches: [ main, master ]
        paths:
            - 'alerter/**'
            - '.github/workflows/ci-alerter.yml'

jobs:
    alerter:
        name: Alerter (Go ${{ matrix.go-version }}, PG ${{ matrix.postgres-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                go-version: ['1.26.2']
                postgres-version: ['14', '15', '16', '17', '18']
            fail-fast: false

        services:
            postgres:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Go ${{ matrix.go-version }}
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: ${{ matrix.go-version }}
                  cache: false

            - name: Cache Go modules
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-${{ matrix.go-version }}-alerter-${{ hashFiles('alerter/src/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-${{ matrix.go-version }}-alerter-

            - name: Verify dependencies
              working-directory: alerter/src
              run: go mod verify

            - name: Download dependencies
              working-directory: alerter/src
              run: go mod download

            - name: Lint alerter code
              if: matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              working-directory: alerter
              run: |
                  go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
                  echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
                  make lint

            - name: Run go vet
              if: matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              working-directory: alerter/src
              run: go vet ./...

            - name: Check formatting
              if: matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              working-directory: alerter
              run: |
                  gofmt -l ./src > /tmp/gofmt.out
                  if [ -s /tmp/gofmt.out ]; then
                    echo "The following files are not formatted:"
                    cat /tmp/gofmt.out
                    exit 1
                  fi

            - name: Build alerter
              working-directory: alerter
              run: make build

            - name: Verify binary
              run: |
                  ls -lh alerter/ai-dba-alerter
                  file alerter/ai-dba-alerter

            - name: Wait for PostgreSQL
              run: |
                  until pg_isready -h localhost -p 5432 -U postgres; do
                    echo "Waiting for PostgreSQL..."
                    sleep 2
                  done

            - name: Run tests with coverage
              working-directory: alerter
              env:
                  TEST_AI_WORKBENCH_SERVER: postgres://postgres:postgres@localhost:5432/postgres
              run: make coverage

            - name: Generate coverage report
              if: matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              working-directory: alerter/src
              run: |
                  go tool cover -func=coverage.out

            # Codacy's coverage reporter cannot parse Go's native cover
            # profile, so convert to lcov (which it does understand)
            # using gcov2lcov before uploading. Pinned to v1.1.1 for
            # reproducibility; see https://github.com/jandelgado/gcov2lcov/releases.
            # gcov2lcov resolves each package path in coverage.out via
            # `go list`, which requires running from inside the module
            # (where go.mod lives). alerter/src is the module root, so
            # we set working-directory there and use relative paths for
            # -infile/-outfile.
            - name: Convert coverage to lcov
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              working-directory: alerter/src
              run: |
                  go install github.com/jandelgado/gcov2lcov@v1.1.1
                  $(go env GOPATH)/bin/gcov2lcov -infile=coverage.out -outfile=coverage.lcov

            # Codacy multi-language coverage: upload as a partial here.
            # Finalization (the single `final` call) happens in the client
            # CI workflow after all language partials have been pushed.
            - name: Upload coverage to Codacy
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              env:
                  CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
              run: |
                  bash <(curl -Ls https://coverage.codacy.com/get.sh) \
                    report \
                    --partial \
                    -l Go \
                    -r alerter/src/coverage.lcov

            - name: Upload build artifact
              if: matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-dba-alerter-linux-amd64
                  path: alerter/ai-dba-alerter
                  retention-days: 7

            - name: Upload coverage artifact
              if: matrix.go-version == '1.26.2' && matrix.postgres-version == '18'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: alerter-coverage
                  path: |
                      alerter/src/coverage.html
                      alerter/src/coverage.out
                  retention-days: 7
