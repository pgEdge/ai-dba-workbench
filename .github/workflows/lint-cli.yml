name: Lint CLI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cli/**'
      - '.github/workflows/lint-cli.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'cli/**'
      - '.github/workflows/lint-cli.yml'

jobs:
  lint:
    name: Lint CLI
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: cli/src/go.sum

    - name: Install golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v2.6.0

    - name: Run linter
      run: |
        cd cli
        make lint
