http:
  address: ":8080"
  tls:
    enabled: false
  auth:
    enabled: true

connection_security:
  allow_internal_networks: true

database:
  host: postgres
  port: 5432
  database: ai_workbench
  user: postgres
  password: postgres
  sslmode: disable

secret_file: /etc/pgedge/ai-dba.secret
data_dir: /data
