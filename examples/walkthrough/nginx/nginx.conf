server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Proxy API requests to the server container
    location /api/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM analysis calls can take 60+ seconds
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Proxy MCP requests to the server container
    location /mcp/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy health check to the server container
    location = /health {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Walkthrough static files (Driver.js, tour, CSS, images)
    location /walkthrough/ {
        alias /usr/share/nginx/html/walkthrough/;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets with hashed filenames
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback with tour injection
    # Note: gzip_proxied must not prevent sub_filter from
    # processing the HTML. Since nginx serves index.html
    # from disk (not proxied), sub_filter works on the
    # uncompressed content before gzip compresses the
    # response to the client. No special handling needed.
    location / {
        sub_filter '</body>'
            '<script src="/walkthrough/loader.js"></script></body>';
        sub_filter_once on;
        try_files $uri $uri/ /index.html;
    }
}
