#
# This is an example configuration file for the pgEdge AI DBA Workbench
# Alerter. Copy this file and customize it for your environment.
#
# Configuration options can be set here or overridden via command line flags.
# Command line flags take precedence over configuration file settings.
#
# YAML format: key: value (note the colon, not equals sign)
#
#=========================================================================
# DATASTORE CONNECTION SETTINGS
#=========================================================================
#
# IMPORTANT: These settings configure the connection to the AI DBA Workbench's
# PostgreSQL datastore database. This is the same datastore used by the
# Collector and Server components.
#
# The datastore contains:
# - Monitoring data collected from your PostgreSQL servers
# - Alert rules and alert history
# - Connection information for monitored servers
# - Baseline metrics for anomaly detection
#

datastore:
  # Hostname or IP address of the AI DBA Workbench datastore PostgreSQL server
  # Default: localhost
  # Command-line: -pg-host
  host: localhost

  # IP address of the datastore server (optional)
  # If set, bypasses DNS resolution and connects directly to this address
  # The host value is still used for SSL certificate verification
  # Default: none
  # Command-line: -pg-hostaddr
  # hostaddr: 127.0.0.1

  # Database name in the AI DBA Workbench datastore
  # Default: ai_workbench
  # Command-line: -pg-database
  database: ai_workbench

  # Username for connecting to the AI DBA Workbench datastore
  # Default: postgres
  # Command-line: -pg-username
  username: postgres

  # Path to file containing the password for the AI DBA Workbench datastore
  # The file should contain only the password with no extra whitespace
  # Default: none (will attempt to use .pgpass if not specified)
  # Command-line: -pg-password-file
  #
  # Example: Create a password file with restricted permissions:
  #   echo "your-password" > /etc/ai-workbench/password.txt
  #   chmod 600 /etc/ai-workbench/password.txt
  #
  # password_file: /etc/ai-workbench/password.txt

  # Port on which the AI DBA Workbench datastore is listening
  # Default: 5432
  # Range: 1-65535
  # Command-line: -pg-port
  port: 5432

  # SSL mode for the AI DBA Workbench datastore connection
  # Options:
  #   disable     - No SSL (not recommended for production)
  #   allow       - Try non-SSL first, then SSL
  #   prefer      - Try SSL first, then non-SSL (default)
  #   require     - Require SSL, don't verify certificate
  #   verify-ca   - Require SSL, verify certificate against CA
  #   verify-full - Require SSL, verify certificate and hostname
  # Default: prefer
  # Command-line: -pg-sslmode
  sslmode: prefer

  # Path to client SSL certificate file (for client certificate authentication)
  # Required when using verify-ca or verify-full SSL modes with client certs
  # Default: none
  # Command-line: -pg-sslcert
  # sslcert: /etc/ai-workbench/client-cert.pem

  # Path to client SSL private key file
  # Required when sslcert is specified
  # Default: none
  # Command-line: -pg-sslkey
  # sslkey: /etc/ai-workbench/client-key.pem

  # Path to root SSL certificate file (Certificate Authority)
  # Required when using verify-ca or verify-full SSL modes
  # Default: none
  # Command-line: -pg-sslrootcert
  # sslrootcert: /etc/ai-workbench/ca-cert.pem

#=========================================================================
# CONNECTION POOL SETTINGS
#=========================================================================
#
# The alerter maintains a connection pool to the datastore for reading
# metrics, evaluating rules, and storing alerts.
#

pool:
  # Maximum number of concurrent connections to the datastore
  # This limits the total number of open connections at any time
  # Higher values allow more concurrent alert evaluation operations
  # Default: 10
  max_connections: 10

  # Maximum idle time for datastore connections in seconds
  # Connections idle longer than this duration are automatically closed
  # Set to 0 to disable automatic cleanup of idle connections
  # Default: 300 (5 minutes)
  max_idle_seconds: 300

#=========================================================================
# THRESHOLD EVALUATION SETTINGS
#=========================================================================
#
# These settings control how frequently the alerter evaluates metrics
# against defined thresholds.
#

threshold:
  # How often to check metrics against threshold rules (in seconds)
  # Lower values provide faster alert detection but increase load
  # Default: 60
  evaluation_interval_seconds: 60

#=========================================================================
# ANOMALY DETECTION SETTINGS
#=========================================================================
#
# The alerter uses a tiered approach to anomaly detection:
#   Tier 1: Statistical analysis using z-score calculations
#   Tier 2: Embedding similarity search using pgvector
#   Tier 3: LLM classification for complex analysis
#
# Each tier can be individually enabled or disabled.
#

anomaly:
  # Enable anomaly detection (requires baseline metrics)
  # Default: true
  enabled: true

  #-------------------------------------------------------------------------
  # Tier 1: Statistical Analysis
  #-------------------------------------------------------------------------
  # Uses z-score calculations to detect deviations from baseline metrics.
  # This tier is fast and suitable for most numeric metrics.

  tier1:
    # Enable tier 1 statistical analysis
    # Default: true
    enabled: true

    # Z-score sensitivity threshold for anomaly detection
    # Values with z-score above this are flagged as anomalies
    # Common values: 2.0 (95%), 2.5 (99%), 3.0 (99.7%)
    # Default: 3.0
    default_sensitivity: 3.0

    # How often to run tier 1 anomaly detection (in seconds)
    # Default: 60
    evaluation_interval_seconds: 60

  #-------------------------------------------------------------------------
  # Tier 2: Embedding Similarity Search
  #-------------------------------------------------------------------------
  # Uses pgvector to find similar patterns in historical data.
  # Requires pgvector extension and pre-computed embeddings.

  tier2:
    # Enable tier 2 embedding similarity search
    # Default: true
    enabled: true

    # Suppression threshold for embedding similarity
    # Anomalies with similarity above this are suppressed as duplicates
    # Range: 0.0 - 1.0
    # Default: 0.85
    suppression_threshold: 0.85

    # Similarity threshold for matching known anomaly patterns
    # Range: 0.0 - 1.0
    # Default: 0.3
    similarity_threshold: 0.3

  #-------------------------------------------------------------------------
  # Tier 3: LLM Classification
  #-------------------------------------------------------------------------
  # Uses large language models to classify complex anomalies.
  # This tier provides the most sophisticated analysis but is slower.

  tier3:
    # Enable tier 3 LLM classification
    # Default: true
    enabled: true

    # Timeout for LLM API calls in seconds
    # Default: 30
    timeout_seconds: 30

#=========================================================================
# BASELINE CALCULATION SETTINGS
#=========================================================================
#
# Baselines are calculated from historical metric data and used for
# anomaly detection. The alerter periodically recalculates baselines.
#

baselines:
  # How often to refresh baseline calculations (in seconds)
  # Default: 3600 (1 hour)
  refresh_interval_seconds: 3600

  # Number of days of historical data to use for baseline calculation
  # Longer lookback periods produce more stable baselines
  # Default: 7
  lookback_days: 7

#=========================================================================
# CORRELATION SETTINGS
#=========================================================================
#
# The alerter can group related alerts that occur within a time window.
# This helps identify root causes and reduces alert noise.
#

correlation:
  # Time window for correlating related alerts (in seconds)
  # Alerts within this window may be grouped together
  # Default: 120
  window_seconds: 120

#=========================================================================
# LLM PROVIDER SETTINGS
#=========================================================================
#
# Configure the LLM providers for tier 2 embeddings and tier 3 reasoning.
# Supports Ollama (local), OpenAI, Anthropic, and Voyage.
#

llm:
  # Provider to use for generating embeddings (tier 2)
  # Options: ollama, openai, gemini, voyage
  # Default: ollama
  embedding_provider: ollama

  # Provider to use for reasoning/classification (tier 3)
  # Options: ollama, openai, gemini, anthropic
  # Default: ollama
  reasoning_provider: ollama

  #-------------------------------------------------------------------------
  # Ollama Settings (local LLM)
  #-------------------------------------------------------------------------

  ollama:
    # Ollama server URL
    # Default: http://localhost:11434
    base_url: http://localhost:11434

    # Model to use for embeddings
    # Default: nomic-embed-text
    embedding_model: nomic-embed-text

    # Model to use for reasoning/classification
    # Default: qwen2.5:7b-instruct
    reasoning_model: qwen2.5:7b-instruct

  #-------------------------------------------------------------------------
  # OpenAI Settings
  #-------------------------------------------------------------------------
  #
  # The openai provider also works with OpenAI-compatible
  # local inference servers. Set base_url to point at a local
  # server. The API key is optional when using a custom base
  # URL.
  #
  # Compatible servers and their default URLs:
  #   Docker Model Runner:
  #     http://localhost:12434/engines/llama.cpp/v1
  #   llama.cpp:  http://localhost:8080/v1
  #   LM Studio:  http://localhost:1234/v1
  #   EXO:        http://localhost:52415/v1
  #

  openai:
    # Path to file containing OpenAI API key
    # File should contain only the API key with no extra
    # whitespace.
    # Optional when using a custom base URL with a local
    # server.
    # api_key_file: /etc/ai-workbench/openai-api-key.txt

    # Base URL for the OpenAI API
    # Override this to use an OpenAI-compatible local server
    # base_url: https://api.openai.com/v1

    # Model to use for embeddings
    # Default: text-embedding-3-small
    embedding_model: text-embedding-3-small

    # Model to use for reasoning/classification
    # Default: gpt-4o-mini
    reasoning_model: gpt-4o-mini

  #-------------------------------------------------------------------------
  # Anthropic Settings
  #-------------------------------------------------------------------------

  anthropic:
    # Path to file containing Anthropic API key
    # File should contain only the API key with no extra whitespace
    # api_key_file: /etc/ai-workbench/anthropic-api-key.txt

    # Base URL for the Anthropic API
    # base_url: https://api.anthropic.com/v1

    # Model to use for reasoning/classification
    # Default: claude-3-5-haiku-20241022
    reasoning_model: claude-3-5-haiku-20241022

  #-------------------------------------------------------------------------
  # Google Gemini Settings
  #-------------------------------------------------------------------------

  gemini:
    # Path to file containing Google Gemini API key
    # File should contain only the API key with no extra whitespace
    # api_key_file: /etc/ai-workbench/gemini-api-key.txt

    # Base URL for the Gemini API
    # base_url: https://generativelanguage.googleapis.com

    # Model to use for reasoning/classification
    # Default: gemini-2.0-flash
    reasoning_model: gemini-2.0-flash

  #-------------------------------------------------------------------------
  # Voyage Settings (for embeddings only)
  #-------------------------------------------------------------------------

  voyage:
    # Path to file containing Voyage API key
    # File should contain only the API key with no extra whitespace
    # api_key_file: /etc/ai-workbench/voyage-api-key.txt

    # Base URL for the Voyage AI API
    # base_url: https://api.voyageai.com/v1/embeddings

    # Model to use for embeddings
    # Default: voyage-3-lite
    embedding_model: voyage-3-lite

#=========================================================================
# NOTIFICATION DELIVERY SETTINGS
#=========================================================================
#
# Configure how the alerter delivers notifications through external
# channels such as email, Slack, Mattermost, and webhooks.
#

notifications:
  # Enable notification delivery
  # Default: false
  enabled: false

  # Path to file containing the server secret for decrypting
  # notification channel credentials (webhook URLs, SMTP passwords,
  # and authentication credentials stored by the Server component).
  #
  # This file must contain the same plain text secret used by the
  # Server and Collector components. You can point to the server's
  # secret file directly or use a copy with identical content.
  #
  # The file should have restricted permissions (chmod 600).
  # Default: none
  #
  # secret_file: /etc/pgedge/ai-dba-alerter.secret

  # How often to process pending notifications (in seconds)
  # Default: 30
  process_interval_seconds: 30

  # How often to check for due reminders (in minutes)
  # Default: 60
  reminder_check_interval_minutes: 60

  # Maximum number of retry attempts for failed notifications
  # Default: 3
  max_retry_attempts: 3

  # Backoff schedule for retries (array of minutes between attempts)
  # Default: [5, 15, 60]
  retry_backoff_minutes: [5, 15, 60]

  # HTTP request timeout for webhooks, Slack, and Mattermost (in seconds)
  # Default: 30
  http_timeout_seconds: 30

  # Maximum number of idle HTTP connections in the connection pool
  # Default: 10
  http_max_idle_conns: 10

#=========================================================================
# BLACKOUT AND RETENTION MANAGEMENT
#=========================================================================
#
# Blackout periods and data retention policies are managed through the
# admin API, not through this configuration file. See the documentation
# for details:
#   - docs/server/blackouts.md
#   - docs/alerter/index.md
#

#=========================================================================
# SECURITY SETTINGS
#=========================================================================

# Path to file containing server secret for encryption (REQUIRED)
#
# This secret is used to encrypt sensitive data and must match the
# secret used by the Collector and Server components.
#
# IMPORTANT SECURITY NOTES:
# - Generate a strong random string (at least 32 characters recommended)
# - Keep this secret secure and do not share it
# - Use the same secret across all AI DBA Workbench components
# - The secret file should have restricted permissions (chmod 600)
#
# Generate a secure secret file:
#   openssl rand -base64 32 > /etc/pgedge/ai-dba-alerter.secret
#   chmod 600 /etc/pgedge/ai-dba-alerter.secret
#
# Default search paths (if not specified):
#   1. /etc/pgedge/ai-dba-alerter.secret
#   2. <binary-directory>/ai-dba-alerter.secret
#   3. ./ai-dba-alerter.secret
#
# secret_file: /etc/pgedge/ai-dba-alerter.secret

