http:
  address: ":8080"
  tls:
    enabled: false
  auth:
    enabled: true
    rate_limit_max_attempts: 100
    rate_limit_window_minutes: 1
    total_rate_limit_max_attempts: 200

connection_security:
  allow_internal_networks: true

database:
  host: postgres
  port: 5432
  database: ai_workbench
  user: postgres
  password: postgres
  sslmode: disable

secret_file: /etc/pgedge/ai-dba.secret
data_dir: /data
