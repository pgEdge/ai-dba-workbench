#
# This is an example configuration file for the pgEdge AI DBA Workbench
# MCP (Model Context Protocol) Server. Copy this file and customize it
# for your environment.
#
# Default config file search paths (in order):
#   1. Explicitly specified via --config flag
#   2. /etc/pgedge/ai-dba-server.yaml (system-wide)
#   3. ./ai-dba-server.yaml (binary directory)
#
# Configuration priority (highest to lowest):
#   1. Command line flags
#   2. Configuration file
#   3. Built-in defaults
#
#=========================================================================
# HTTP SERVER CONFIGURATION
#=========================================================================
#
# The MCP server exposes an HTTP/HTTPS API for clients to connect to.
# HTTP mode is always enabled.
#
http:
  # Address to listen on (host:port or :port for all interfaces)
  # Default: :8080
  address: ":8080"

  #-----------------------------------------------------------------------
  # TLS/HTTPS Configuration
  #-----------------------------------------------------------------------
  tls:
    # Enable TLS/HTTPS
    # Default: false
    enabled: false

    # Path to TLS certificate file
    # Required when tls.enabled is true
    # cert_file: "/etc/ai-workbench/certs/server-cert.pem"

    # Path to TLS private key file
    # Required when tls.enabled is true
    # key_file: "/etc/ai-workbench/certs/server-key.pem"

    # Path to TLS certificate chain file (optional)
    # chain_file: "/etc/ai-workbench/certs/chain.pem"

  #-----------------------------------------------------------------------
  # Authentication Configuration
  #-----------------------------------------------------------------------
  #
  # Authentication data (users, tokens, sessions) is stored in a SQLite
  # database within the data_dir directory. Use the CLI commands to manage
  # users and service tokens:
  #
  #   ai-dba-server add-user [--username USER] [--password PASS]
  #   ai-dba-server list-users
  #   ai-dba-server add-token [--annotation NOTE] [--expires DURATION]
  #   ai-dba-server list-tokens
  #
  auth:
    # Enable authentication (strongly recommended for production)
    # Default: true
    enabled: true

    # Account lockout after N failed login attempts (0 = disabled)
    # Default: 0 (disabled)
    max_failed_attempts_before_lockout: 0

    # Maximum days for user-created tokens (0 = unlimited)
    # This limits how long users can set their personal tokens to live
    # Default: 0 (unlimited)
    max_user_token_days: 0

    # Rate limiting time window in minutes
    # Default: 15
    rate_limit_window_minutes: 15

    # Maximum failed attempts per IP in the time window
    # Default: 10
    rate_limit_max_attempts: 10

#=========================================================================
# DATABASE CONNECTION
#=========================================================================
#
# The server connects to the AI DBA Workbench datastore (PostgreSQL database)
# which stores user accounts, tokens, connections, and collected metrics.
#
database:
  # Database host
  # Default: localhost
  host: "localhost"

  # Database port
  # Default: 5432
  port: 5432

  # Database name
  # Default: postgres
  database: "ai_workbench"

  # Database user
  # Required - there is no default
  user: "postgres"

  # Database password
  # If not set, will use .pgpass file automatically
  # password: ""

  # SSL mode: disable, require, verify-ca, verify-full
  # Default: prefer
  sslmode: "prefer"

  #-----------------------------------------------------------------------
  # Connection Pool Settings
  #-----------------------------------------------------------------------

  # Maximum number of connections in the pool
  # Default: 4
  pool_max_conns: 4

  # Minimum number of connections in the pool
  # Default: 0
  pool_min_conns: 0

  # Maximum time a connection can be idle before being closed
  # Default: 30m
  pool_max_conn_idle_time: "30m"

#=========================================================================
# EMBEDDING GENERATION
#=========================================================================
#
# The server can generate text embeddings for vector similarity search.
# This is optional and disabled by default.
#
embedding:
  # Enable embedding generation
  # Default: false
  enabled: false

  # Embedding provider: "voyage", "openai", or "ollama"
  # Default: ollama
  provider: "ollama"

  # Embedding model name
  # Default depends on provider:
  #   - voyage: voyage-3
  #   - openai: text-embedding-3-small
  #   - ollama: nomic-embed-text
  model: "nomic-embed-text"

  #-----------------------------------------------------------------------
  # Voyage AI Configuration
  #-----------------------------------------------------------------------

  # Voyage AI API key (or use voyage_api_key_file)
  # voyage_api_key: ""

  # Path to file containing Voyage API key
  # voyage_api_key_file: "~/.voyage-api-key"

  #-----------------------------------------------------------------------
  # OpenAI Configuration
  #-----------------------------------------------------------------------

  # OpenAI API key for embeddings (or use openai_api_key_file)
  # openai_api_key: ""

  # Path to file containing OpenAI API key
  # openai_api_key_file: "~/.openai-api-key"

  #-----------------------------------------------------------------------
  # Ollama Configuration
  #-----------------------------------------------------------------------

  # Ollama service URL
  # Default: http://localhost:11434
  ollama_url: "http://localhost:11434"

#=========================================================================
# LLM CONFIGURATION (Web Client Chat Proxy)
#=========================================================================
#
# The server proxies LLM requests for web clients and CLI tools that
# don't have direct access to LLM APIs. API keys must be configured
# for the chosen provider.
#
llm:
  # LLM provider: "anthropic", "openai", or "ollama"
  # Default: anthropic
  provider: "anthropic"

  # Model name
  # Default: claude-sonnet-4-5
  model: "claude-sonnet-4-5"

  #-----------------------------------------------------------------------
  # Anthropic Configuration
  #-----------------------------------------------------------------------

  # Anthropic API key (or use anthropic_api_key_file)
  # anthropic_api_key: ""

  # Path to file containing Anthropic API key
  # anthropic_api_key_file: "~/.anthropic-api-key"

  #-----------------------------------------------------------------------
  # OpenAI Configuration
  #-----------------------------------------------------------------------

  # OpenAI API key (or use openai_api_key_file)
  # openai_api_key: ""

  # Path to file containing OpenAI API key
  # openai_api_key_file: "~/.openai-api-key"

  #-----------------------------------------------------------------------
  # Ollama Configuration
  #-----------------------------------------------------------------------

  # Ollama service URL
  # Default: http://localhost:11434
  ollama_url: "http://localhost:11434"

  #-----------------------------------------------------------------------
  # Generation Parameters
  #-----------------------------------------------------------------------

  # Maximum tokens for LLM response
  # Default: 4096
  max_tokens: 4096

  # Temperature for sampling
  # Default: 0.7
  temperature: 0.7

#=========================================================================
# KNOWLEDGEBASE CONFIGURATION
#=========================================================================
#
# The server can search a pre-built knowledgebase for relevant information.
# This is optional and disabled by default.
#
knowledgebase:
  # Enable knowledgebase search
  # Default: false
  enabled: false

  # Path to SQLite knowledgebase database
  # Required if knowledgebase is enabled
  # database_path: "/var/lib/ai-workbench/knowledgebase.db"

  #-----------------------------------------------------------------------
  # Knowledgebase Embedding Configuration
  # (separate from the generate_embedding tool)
  #-----------------------------------------------------------------------

  # Embedding provider for knowledgebase similarity search
  # Default: ollama
  embedding_provider: "ollama"

  # Embedding model for knowledgebase
  # Default: nomic-embed-text
  embedding_model: "nomic-embed-text"

  # Ollama URL for knowledgebase embeddings
  # Default: http://localhost:11434
  embedding_ollama_url: "http://localhost:11434"

  # Voyage API key for knowledgebase embeddings
  # embedding_voyage_api_key: ""

  # OpenAI API key for knowledgebase embeddings
  # embedding_openai_api_key: ""

#=========================================================================
# BUILT-IN TOOLS, RESOURCES, AND PROMPTS
#=========================================================================
#
# Control which built-in MCP features are enabled. All are enabled by
# default. Set to false to disable specific tools, resources, or prompts.
#
builtins:
  tools:
    # Execute arbitrary SQL queries
    query_database: true

    # Get detailed schema information (tables, columns, indexes, etc.)
    get_schema_info: true

    # Vector similarity search
    similarity_search: true

    # Execute EXPLAIN/EXPLAIN ANALYZE queries
    execute_explain: true

    # Generate text embeddings
    generate_embedding: true

    # Search the knowledgebase
    search_knowledgebase: true

    # Count rows in tables
    count_rows: true

  resources:
    # Expose PostgreSQL system information
    system_info: true

  prompts:
    # Database exploration prompt
    explore_database: true

    # Semantic search setup prompt
    setup_semantic_search: true

    # Query performance diagnosis prompt
    diagnose_query_issue: true

    # Schema design prompt
    design_schema: true

#=========================================================================
# PATHS AND DATA DIRECTORIES
#=========================================================================

# Path to server secret file (for encryption)
# Default: /etc/pgedge/ai-dba-server.secret or ./ai-dba-server.secret
# secret_file: "/etc/ai-workbench/server.secret"

# Path to custom definitions file (user-defined prompts and resources)
# custom_definitions_path: "/etc/ai-workbench/custom-definitions.yaml"

# Data directory for conversation history and other persistent data
# data_dir: "/var/lib/ai-workbench/data"

