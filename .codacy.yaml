---
# Codacy configuration for the pgEdge AI DBA Workbench.
#
# Codacy does not honour inline disable comments or per-rule excludes
# in this configuration file; suppression is path-based and applies
# per analyser ("engine"). The exclusions below are scoped narrowly:
# each entry suppresses one or more confirmed false positives, and
# every excluded path is still covered by the project's local ESLint
# (`client/eslint.config.js`) and by other Codacy engines that are
# not listed here.

exclude_paths:
  # Internal planning, agent prompts, and project standing instructions.
  - '.claude/**'
  - 'CLAUDE.md'
  # Walkthrough samples and other example assets are not shipped code.
  - 'examples/**'

engines:
  # Codacy's Semgrep ruleset includes
  # `codacy.javascript.security.hard-coded-password`, which fires on
  # any identifier whose name ends in *_KEY, *_TOKEN, *_PASSWORD, or
  # similar -- regardless of the actual value. Every occurrence in
  # this repository has been audited and is one of:
  #   * a localStorage key (string literal, no secret material);
  #   * a CSS selector key in a Prism theme map;
  #   * a throwaway test fixture (login flow, copy-token dialog).
  # The files below are excluded from semgrep only; eslint-8, trivy,
  # biome, and the other Codacy engines continue to scan them.
  semgrep:
    exclude_paths:
      # Production constants - localStorage keys / CSS selector keys.
      - 'client/src/components/AIOverview/index.tsx'
      - 'client/src/components/ChatPanel/index.tsx'
      - 'client/src/components/EventTimeline/config.ts'
      - 'client/src/components/ServerInfoDialog/serverInfoStyles.ts'
      - 'client/src/components/shared/markdownUtils.ts'
      - 'client/src/hooks/chat/chatConstants.ts'
      # Test fixtures - intentionally use throwaway "password" /
      # "token" strings to exercise login and storage code paths.
      - 'client/src/components/Dashboard/__tests__/CollapsibleSection.test.tsx'
      - 'client/src/components/AdminPanel/__tests__/AdminTokenScopes.test.tsx'
      - 'client/src/components/AdminPanel/tokens/__tests__/CreatedTokenDialog.test.tsx'

  # Codacy's ESLint8 ruleset enables eslint-plugin-xss and
  # eslint-plugin-security-node, which are not part of the project's
  # local lint configuration. These plugins false-positive heavily on:
  #   * React Testing Library idioms (passing DOM Element references
  #     returned from render() into expect()/fireEvent.click() is
  #     the documented testing API; the elements are not raw HTML);
  #   * The React 18 createRoot() bootstrap, which receives a DOM
  #     Element from getElementById, not an HTML string;
  #   * try/catch-wrapped awaits and intentional re-throws inside
  #     async functions (the rule does not see the catch);
  #   * Anchored regular expressions with no nested quantifiers
  #     (no catastrophic backtracking risk).
  # Excluding these specific files preserves ESLint coverage of every
  # other production source file. The project's local ESLint runs
  # against all of these paths in CI via `make lint`.
  #
  # Two unused-vars patterns also need to be disabled in the Codacy UI
  # (Code patterns page) because Codacy's ESLint8 ignores the project's
  # eslint.config.js for these rules and `.codacy.yaml` does not support
  # per-pattern disables (only path exclusions per engine):
  #
  #   ESLint8_no-unused-vars
  #     Vanilla ESLint rule. Cannot distinguish parameter names inside
  #     TypeScript function-type annotations (which are documentation,
  #     not bindings) from real unused variables. The project relies on
  #     the typescript-eslint variant exclusively; the vanilla rule is
  #     not enabled in eslint.config.js. Disable in the Codacy UI.
  #
  #   ESLint8_@typescript-eslint_no-unused-vars
  #     Codacy runs this rule with default options. The project enables
  #     it with `argsIgnorePattern: '^_'` and `varsIgnorePattern: '^_'`
  #     (eslint.config.js, lines 39-45) so that intentional `_`-prefixed
  #     destructured params (e.g. `depth: _depth = 0`) do not trip it.
  #     Codacy ignores those options. Disable in the Codacy UI; the
  #     project's local ESLint continues to enforce it correctly.
  eslint-8:
    exclude_paths:
      # Test directories - eslint-plugin-xss flags every RTL pattern.
      - 'client/src/**/__tests__/**'
      # Application bootstrap - createRoot(getElementById('root')).
      - 'client/src/main.tsx'
      # Anchored regex with no backtracking risk (utils.ts:223).
      - 'client/src/components/ClusterNavigator/utils.ts'
      # try/catch-wrapped awaits and intentional re-throw.
      - 'client/src/utils/mcpTools.ts'
      - 'client/src/utils/agenticLoop.ts'
      - 'client/src/utils/apiClient.ts'

  # Codacy uses PMD's Copy/Paste Detector under the `duplication`
  # engine. CPD measures structural similarity between source files
  # and reports near-identical token sequences as "clones". The
  # repository's table-driven test files trigger this detector very
  # heavily because Go and Vitest table tests are *intentionally*
  # repetitive: each entry in a test table shares the same arrange/
  # act/assert skeleton, varying only the inputs and expected outputs.
  # That structural similarity is the entire point of the pattern --
  # it is good test code, not duplicated production logic, and it
  # should not influence the duplication grade.
  #
  # Without these exclusions Codacy graded the project a D, with the
  # top offenders all being table-driven test files:
  #   * server/src/internal/auth/access_test.go        (437 clones)
  #   * server/src/internal/api/cluster_handlers_test.go (313 clones)
  #   * server/src/internal/api/rbac_user_handlers_test.go (278 clones)
  # Production source files were not significant contributors.
  #
  # The patterns below cover Go test files (`*_test.go`), Go testdata
  # fixtures (where any duplication is the fixture's job), Vitest
  # tests (`*.test.ts`/`*.test.tsx` and anything under `__tests__/`),
  # and the shared client test helpers under `client/src/test/`.
  # Production code in every sub-project remains scanned for
  # duplication, so genuine copy/paste in shipping code still gets
  # caught.
  duplication:
    exclude_paths:
      # Go: table-driven unit tests and Go testdata fixtures.
      - '**/*_test.go'
      - '**/testdata/**'
      # TypeScript/React: Vitest tests in __tests__ folders and any
      # *.test.ts / *.test.tsx co-located with source.
      - '**/__tests__/**'
      - '**/*.test.ts'
      - '**/*.test.tsx'
      # Shared Vitest setup and render helpers (see
      # client/vitest.config.js -> setupFiles).
      - 'client/src/test/**'
