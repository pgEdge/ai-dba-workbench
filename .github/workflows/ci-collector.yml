name: CI - Collector

on:
    push:
        branches: [ main, master ]
        paths:
            - 'collector/**'
            - '.github/workflows/ci-collector.yml'
    pull_request:
        branches: [ main, master ]
        paths:
            - 'collector/**'
            - '.github/workflows/ci-collector.yml'

jobs:
    collector:
        name: Collector (Go ${{ matrix.go-version }}, PG ${{ matrix.postgres-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                go-version: ['1.26']
                postgres-version: ['14', '15', '16', '17', '18']
            fail-fast: false

        services:
            postgres:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go ${{ matrix.go-version }}
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ matrix.go-version }}
                  cache: false

            - name: Cache Go modules
              uses: actions/cache@v5
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-${{ matrix.go-version }}-collector-${{ hashFiles('collector/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-${{ matrix.go-version }}-collector-

            - name: Verify dependencies
              working-directory: collector
              run: go mod verify

            - name: Download dependencies
              working-directory: collector
              run: go mod download

            - name: Lint collector code
              if: matrix.go-version == '1.26' && matrix.postgres-version == '18'
              working-directory: collector
              run: |
                  go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
                  echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
                  make lint

            - name: Run go vet
              if: matrix.go-version == '1.26' && matrix.postgres-version == '18'
              working-directory: collector
              run: go vet ./...

            - name: Check formatting
              if: matrix.go-version == '1.26' && matrix.postgres-version == '18'
              working-directory: collector
              run: |
                  gofmt -l ./src > /tmp/gofmt.out
                  if [ -s /tmp/gofmt.out ]; then
                    echo "The following files are not formatted:"
                    cat /tmp/gofmt.out
                    exit 1
                  fi

            - name: Build collector
              working-directory: collector
              run: make build

            - name: Verify binary
              run: |
                  ls -lh collector/ai-dba-collector
                  file collector/ai-dba-collector

            - name: Wait for PostgreSQL
              run: |
                  until pg_isready -h localhost -p 5432 -U postgres; do
                    echo "Waiting for PostgreSQL..."
                    sleep 2
                  done

            - name: Run tests with coverage
              working-directory: collector
              env:
                  TEST_AI_WORKBENCH_SERVER: postgres://postgres:postgres@localhost:5432/postgres
              run: make coverage

            - name: Generate coverage report
              if: matrix.go-version == '1.26' && matrix.postgres-version == '18'
              working-directory: collector
              run: |
                  go tool cover -func=src/coverage.out

            - name: Upload build artifact
              if: matrix.go-version == '1.26' && matrix.postgres-version == '18'
              uses: actions/upload-artifact@v7
              with:
                  name: ai-dba-collector-linux-amd64
                  path: collector/ai-dba-collector
                  retention-days: 7

            - name: Upload coverage artifact
              if: matrix.go-version == '1.26' && matrix.postgres-version == '18'
              uses: actions/upload-artifact@v7
              with:
                  name: collector-coverage
                  path: |
                      collector/src/coverage.html
                      collector/src/coverage.out
                  retention-days: 7
