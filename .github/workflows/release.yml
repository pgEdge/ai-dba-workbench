name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ------------------------------------------------------------------
    # Build the web client
    # ------------------------------------------------------------------
    build-client:
        name: Build Web UI
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: client

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Node.js 20
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: client/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build client
              run: npm run build

            - name: Upload client artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-dba-client-dist
                  path: client/dist/
                  retention-days: 1

    # ------------------------------------------------------------------
    # Build the documentation site
    # ------------------------------------------------------------------
    build-docs:
        name: Build Documentation
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Python 3.11
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version: '3.11'
                  cache: 'pip'

            - name: Create virtual environment and install dependencies
              run: |
                  python3 -m venv venv
                  source venv/bin/activate
                  pip install -r requirements.txt

            - name: Build documentation
              run: |
                  source venv/bin/activate
                  mkdocs build -v

            - name: Upload documentation artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-workbench-docs-site
                  path: site/
                  retention-days: 1

    # ------------------------------------------------------------------
    # Build Go binaries for all platforms
    # ------------------------------------------------------------------
    build-go:
        name: Build Go (${{ matrix.goos }}/${{ matrix.goarch }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                goos: [linux, darwin]
                goarch: [amd64, arm64]
            fail-fast: false

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Go 1.26
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: '1.26'
                  cache: false

            - name: Cache Go modules (server)
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-1.26-release-server-${{ hashFiles('server/src/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-1.26-release-server-

            - name: Cache Go modules (collector)
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-1.26-release-collector-${{ hashFiles('collector/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-1.26-release-collector-

            - name: Cache Go modules (alerter)
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-1.26-release-alerter-${{ hashFiles('alerter/src/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-1.26-release-alerter-

            - name: Build ai-dba-server
              working-directory: server/src
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
                  CGO_ENABLED: '0'
              run: go build -ldflags="-s -w" -o ../../ai-dba-server ./cmd/mcp-server

            - name: Build ai-dba-collector
              working-directory: collector/src
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
                  CGO_ENABLED: '0'
              run: go build -ldflags="-s -w" -o ../../ai-dba-collector .

            - name: Build ai-dba-alerter
              working-directory: alerter/src
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
                  CGO_ENABLED: '0'
              run: go build -ldflags="-s -w" -o ../../ai-dba-alerter ./cmd/ai-dba-alerter

            - name: Create archives
              run: |
                  tar czf ai-dba-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ai-dba-server
                  tar czf ai-dba-collector-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ai-dba-collector
                  tar czf ai-dba-alerter-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ai-dba-alerter

            - name: Upload server archive
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-dba-server-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: ai-dba-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
                  retention-days: 1

            - name: Upload collector archive
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-dba-collector-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: ai-dba-collector-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
                  retention-days: 1

            - name: Upload alerter archive
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-dba-alerter-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: ai-dba-alerter-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
                  retention-days: 1

    # ------------------------------------------------------------------
    # Create the GitHub release
    # ------------------------------------------------------------------
    release:
        name: Create Release
        runs-on: ubuntu-latest
        needs: [build-client, build-docs, build-go]

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  path: artifacts

            - name: Prepare release assets
              run: |
                  mkdir -p release

                  # Create client archive from dist directory
                  tar czf release/ai-dba-client.tar.gz \
                      -C artifacts/ai-dba-client-dist .

                  # Create docs archive from site directory
                  tar czf release/ai-workbench-docs.tar.gz \
                      -C artifacts/ai-workbench-docs-site .

                  # Move Go binary archives into release directory
                  find artifacts -name '*.tar.gz' -exec cp {} release/ \;

                  # Generate checksums
                  cd release
                  sha256sum *.tar.gz > checksums.txt

            - name: List release assets
              run: |
                  echo "Release assets:"
                  ls -lh release/
                  echo ""
                  echo "Checksums:"
                  cat release/checksums.txt

            - name: Create GitHub release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: release/*
