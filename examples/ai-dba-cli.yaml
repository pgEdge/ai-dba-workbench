# Development with Local Ollama
#-------------------------------------------------------------------------
# mcp:
#   url: "http://localhost:8080"
#   auth_mode: "user"
# llm:
#   provider: "ollama"
#   model: "qwen3-coder:latest"
# ui:
#   no_color: false
#   display_status_messages: true
#   debug: true

