name: Lint Collector

on:
  push:
    branches: [ main, master ]
    paths:
      - 'collector/**'
      - '.github/workflows/lint-collector.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'collector/**'
      - '.github/workflows/lint-collector.yml'

jobs:
  lint:
    name: Lint Collector
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: collector/go.sum

    - name: Install golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: Run linter
      run: |
        cd collector
        make lint
