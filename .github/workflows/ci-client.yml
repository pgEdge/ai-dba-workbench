name: CI - Client

on:
    push:
        branches: [ main, master ]
        paths:
            - 'client/**'
            - '.github/workflows/ci-client.yml'
    pull_request:
        branches: [ main, master ]
        paths:
            - 'client/**'
            - '.github/workflows/ci-client.yml'

jobs:
    client:
        name: Client (Node.js ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: ['22', '24']
            fail-fast: false

        defaults:
            run:
                working-directory: client

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
                  cache-dependency-path: client/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              if: matrix.node-version == '24'
              run: npm test

            - name: Run tests with coverage
              if: matrix.node-version == '22'
              run: npm run test:coverage

            # Codacy coverage upload.
            #
            # This is a *partial* upload. The repository has four
            # coverage producers: server/, collector/, alerter/ (Go)
            # and client/ (TypeScript). Each CI workflow uploads its
            # own coverage with `--partial` and the
            # `.github/workflows/coverage-finalize.yml` workflow
            # issues a single `final` call once all four have
            # completed. Do not switch this step to a non-partial
            # upload without coordinating with the Go workflows --
            # mismatched `--partial` flags cause Codacy to publish
            # incomplete coverage and overwrite the previous run.
            #
            # The upload is gated to push events on the main branch.
            # PR builds and topic-branch builds are skipped on
            # purpose: those runs would push noisy diff baselines
            # into Codacy and burn through the per-project upload
            # quota. CODACY_PROJECT_TOKEN must be configured as a
            # repository secret for this step to succeed; without
            # it the curl pipeline exits non-zero.
            - name: Upload coverage to Codacy
              if: matrix.node-version == '22' && github.event_name == 'push' && github.ref == 'refs/heads/main'
              env:
                  CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
              working-directory: ${{ github.workspace }}
              run: |
                  bash <(curl -Ls https://coverage.codacy.com/get.sh) \
                    report \
                    --partial \
                    -l TypeScript \
                    -r client/coverage/lcov.info

            - name: Build client
              run: npm run build

            - name: Verify build output
              run: |
                  ls -lh dist/
                  echo "Build completed successfully"

            - name: Upload build artifact
              if: matrix.node-version == '22'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ai-dba-client-dist
                  path: client/dist/
                  retention-days: 7

            - name: Upload coverage artifact
              if: matrix.node-version == '22'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: client-coverage
                  path: client/coverage/
                  retention-days: 7
