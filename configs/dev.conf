# Datastore PostgreSQL connection settings
pg_host = localhost
pg_database = ai_workbench
pg_port = 5432
pg_sslmode = disable

# Connection pool settings
# Note: Increase max_connections if monitoring many databases
pool_max_connections = 50
pool_max_idle_seconds = 300
monitored_pool_max_connections = 5

# Server secret for encryption
# WARNING: Change this to a secure random value in production!
server_secret = dev-secret-change-in-production
