# golangci-lint v2 configuration.
# To install:
#   go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
# Migrated from v1 with `golangci-lint migrate`; the set of enabled linters
# and per-path exclusions is preserved.
version: "2"
run:
  tests: true
linters:
  enable:
    - gocritic
    - gosec
    - misspell
  settings:
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: true
      check-blank: true
    goconst:
      min-len: 3
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - commentedOutCode
        - hugeParam
        - octalLiteral
        - httpNoBody
        - paramTypeCombine
        - appendCombine
        - ifElseChain
        - unnamedResult
        - exitAfterDefer
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 50
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    lll:
      line-length: 120
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocritic
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocritic
          - gocyclo
        path: test/
    paths:
      - .*\.pb\.go$
      - vendor
      - bin
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
