# pgEdge AI DBA Workbench - Website Walkthrough
#
# A self-contained walkthrough stack with pre-seeded data and a guided
# in-browser tour.  Start with:
#
#   cd examples/walkthrough
#   ./guide.sh
#
# Or manually:
#
#   docker compose up -d --build
#

name: workbench-walkthrough

services:
    postgres:
        image: ghcr.io/pgedge/pgedge-postgres:18-spock5-standard
        container_name: wt-datastore
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ai_workbench
        command: ["postgres", "-c", "listen_addresses=*"]
        volumes:
            - wt-datastore-data:/var/lib/pgsql/18/data
            - ./seed/datastore-seed-4h.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 10
        ports:
            - "${WT_DATASTORE_PORT:-5432}:5432"

    server:
        image: ghcr.io/pgedge/ai-dba-server:latest
        container_name: wt-server
        # Override CMD to pass --data-dir explicitly. The server
        # resolves data_dir from CLI flags before loading the YAML
        # config, so the YAML data_dir setting is ignored.
        command: ["--config", "/etc/pgedge/ai-dba-server.yaml", "--data-dir", "/data"]
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./config/ai-dba-server.yaml:/etc/pgedge/ai-dba-server.yaml:ro
            - ./secret:/etc/pgedge/secret:ro
            - wt-server-data:/data
        ports:
            - "${WT_SERVER_PORT:-8080}:8080"
        restart: unless-stopped

    collector:
        image: ghcr.io/pgedge/ai-dba-collector:latest
        container_name: wt-collector
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./config/ai-dba-collector.yaml:/etc/pgedge/ai-dba-collector.yaml:ro
            - ./secret:/etc/pgedge/secret:ro
        restart: unless-stopped

    alerter:
        image: ghcr.io/pgedge/ai-dba-alerter:latest
        container_name: wt-alerter
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./config/ai-dba-alerter.yaml:/etc/pgedge/ai-dba-alerter.yaml:ro
            - ./secret:/etc/pgedge/secret:ro
        restart: unless-stopped

    client:
        image: ghcr.io/pgedge/ai-dba-client:latest
        container_name: wt-client
        depends_on:
            - server
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./nginx/walkthrough:/usr/share/nginx/html/walkthrough:ro
        ports:
            - "${WT_CLIENT_PORT:-3000}:80"
        restart: unless-stopped

    pg-demo:
        image: ghcr.io/pgedge/pgedge-postgres:18-spock5-standard
        container_name: wt-pg-demo
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ecommerce
        command:
            - postgres
            - -c
            - listen_addresses=*
            - -c
            - shared_preload_libraries=spock,pg_stat_statements
            - -c
            - wal_level=logical
            - -c
            - track_commit_timestamp=on
            - -c
            - max_connections=30
            - -c
            - track_io_timing=on
        volumes:
            - wt-pg-demo-data:/var/lib/pgsql/18/data
            - ./seed/demo-schema.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
        healthcheck:
            # Verify seed data is loaded, not just pg_isready
            test: ["CMD-SHELL", "psql -U postgres -d ecommerce -tAc 'SELECT 1 FROM orders LIMIT 1;' | grep -q 1"]
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 10s
        ports:
            - "${WT_DEMO_PORT:-5433}:5432"

    workload:
        image: postgres:18
        container_name: wt-workload
        depends_on:
            pg-demo:
                condition: service_healthy
        volumes:
            - ./seed/workload.sh:/workload.sh:ro
        entrypoint: ["bash", "/workload.sh"]
        environment:
            PGHOST: pg-demo
            PGPORT: "5432"
            PGDATABASE: ecommerce
            PGUSER: postgres
            PGPASSWORD: postgres
        restart: unless-stopped

volumes:
    wt-datastore-data:
    wt-server-data:
    wt-pg-demo-data:
