name: Build Server

on:
  push:
    branches: [ main, master ]
    paths:
      - 'server/**'
      - '.github/workflows/build-server.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'server/**'
      - '.github/workflows/build-server.yml'

jobs:
  build:
    name: Build Server Binary (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23', '1.24', '1.25']

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: server/go.sum

    - name: Build Server
      run: |
        cd server
        make build

    - name: Verify binary was created
      run: |
        if [ ! -f server/mcp-server ]; then
          echo "Error: Binary server/mcp-server was not created"
          exit 1
        fi
        echo "Build successful: server/mcp-server created with Go ${{ matrix.go-version }}"
