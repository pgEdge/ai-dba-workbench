#
# This is an example configuration file for the pgEdge AI DBA Workbench
# CLI (Command Line Interface). Copy this file and customize it for your
# environment.
#
# Default config file search paths (in order):
#   1. Explicitly specified via --config flag
#   2. .ai-dba-cli.yaml (current directory)
#   3. ~/.ai-dba-cli.yaml (home directory)
#   4. /etc/pgedge/ai-dba-cli.yaml (system-wide)
#
# Configuration priority (highest to lowest):
#   1. Command line flags
#   2. Configuration file
#   3. Built-in defaults
#
#=========================================================================
# MCP SERVER CONNECTION
#=========================================================================
#
# The CLI connects to an MCP (Model Context Protocol) server which provides
# access to PostgreSQL database tools, resources, and the LLM proxy.
#
mcp:
  # URL of the MCP server
  # Required - there is no default
  url: "http://localhost:8080"

  # Authentication mode: "token" or "user"
  # - token: Use a pre-generated API token for authentication
  # - user: Use username/password authentication (prompts if not configured)
  # Default: user
  auth_mode: "user"

  # API token for token-based authentication
  # Can also be stored in ~/.ai-dba-cli-token file
  # token: "your-api-token-here"

  # Username for user-based authentication
  # If not set, will prompt interactively
  # username: "admin"

  # Password for user-based authentication
  # If not set, will prompt interactively
  # password: ""

  # Enable TLS/HTTPS for MCP server connection
  # Set to true if the MCP server uses HTTPS
  # Default: false
  tls: false

#=========================================================================
# LLM (Large Language Model) CONFIGURATION
#=========================================================================
#
# The CLI uses an LLM to interpret natural language queries and generate
# responses. LLM API calls are made through the MCP server's LLM proxy,
# so API keys are configured on the server, not the CLI.
#
llm:
  # LLM provider to use: "anthropic", "openai", or "ollama"
  # The server must have the corresponding API key configured
  # Default: anthropic
  provider: "anthropic"

  # Model name to use (optional - server has defaults per provider)
  # Default depends on provider:
  #   - anthropic: claude-sonnet-4-5-20250929
  #   - openai: gpt-4o
  #   - ollama: qwen3-coder:latest
  model: "claude-sonnet-4-5-20250929"

  # Maximum tokens for LLM response
  # Default: 4096
  max_tokens: 4096

  # Temperature for sampling (0.0 = deterministic, 1.0 = creative)
  # Default: 0.7
  temperature: 0.7

#=========================================================================
# USER INTERFACE SETTINGS
#=========================================================================
#
# These settings control the CLI's output and display behavior.
#
ui:
  # Disable colored output
  # Useful for terminals that don't support ANSI colors or for piping output
  # Default: false (colors enabled)
  no_color: false

  # Display status messages during execution
  # Shows progress indicators like "Thinking...", "Calling tool...", etc.
  # Default: true
  display_status_messages: true

  # Render markdown with formatting and syntax highlighting
  # When true, output is formatted with colors, bold, etc.
  # When false, raw markdown is displayed
  # Default: true
  render_markdown: true

  # Display debug messages
  # Shows additional information like LLM token usage
  # Default: false
  debug: false

#=========================================================================
# MISCELLANEOUS SETTINGS
#=========================================================================

# Path to chat history file
# Used to persist conversation history between sessions
# Default: ~/.ai-dba-workbench-cli-history
# history_file: "~/.ai-dba-workbench-cli-history"

#=========================================================================
# EXAMPLE CONFIGURATIONS
#=========================================================================
#
# Below are example configurations for common usage scenarios.
#

